name: Release

on:
  push:
    branches: [ "release" ]

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: read

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Publish crates
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATE_IO_NAHPU_API }}
        run: |
          # Publish dependencies before crates that declare them as registry
          # dependencies. In particular, nahpu_dwc and nahpu_export require nahpu_db
          CRATES=(
            nahpu_archive
            nahpu_db
            nahpu_configs
            nahpu_dp
            nahpu_gis
            nahpu_export
            nahpu_dwc
          )

          for crate in "${CRATES[@]}"; do
            echo "Publishing $crate..."
            PUBLISHED=false
            for attempt in 1 2 3; do
              EXIT_CODE=0
              OUTPUT=$(cargo publish -p "$crate" 2>&1) || EXIT_CODE=$?
              echo "$OUTPUT"

              if [ "$EXIT_CODE" -eq 0 ]; then
                echo "Successfully published $crate."
                PUBLISHED=true
                break
              elif echo "$OUTPUT" | grep -q "already exists"; then
                echo "Crate $crate is already published. Skipping."
                PUBLISHED=true
                break
              elif echo "$OUTPUT" | grep -q "failed to select a version" && [ "$attempt" -lt 3 ]; then
                echo "Registry has not propagated a dependency yet; retrying in 30s."
                sleep 30
              else
                echo "Error: Failed to publish $crate."
                exit 1
              fi
            done

            if [ "$PUBLISHED" != true ]; then
              echo "Error: Failed to publish $crate after retries."
              exit 1
            fi

            # Allow crates.io's index and download service to observe the
            # newly published version before publishing dependents.
            sleep 30
          done
