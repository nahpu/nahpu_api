name: Release

on:
  push:
    branches: [ "release" ]

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: read

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Publish crates
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATE_IO_NAHPU_API }}
        run: |
          UNPUBLISHED=$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[] | select(.publish != []) | .name')
          
          while [ -n "$UNPUBLISHED" ]; do
            PROGRESS=0
            REMAINING=""
            for crate in $UNPUBLISHED; do
              echo "Attempting to publish $crate..."
              EXIT_CODE=0
              OUTPUT=$(cargo publish -p $crate 2>&1) || EXIT_CODE=$?
              echo "$OUTPUT"
              
              if [ $EXIT_CODE -eq 0 ]; then
                echo "Successfully published $crate."
                PROGRESS=1
                sleep 5
              else
                if echo "$OUTPUT" | grep -q "is already uploaded"; then
                  echo "Crate $crate is already published. Skipping."
                  PROGRESS=1
                else
                  echo "Failed to publish $crate. Will retry in next iteration if progress is made."
                  REMAINING="$REMAINING $crate"
                fi
              fi
            done
            
            UNPUBLISHED=$(echo "$REMAINING" | xargs)
            if [ -z "$UNPUBLISHED" ]; then
              break
            fi
            
            if [ $PROGRESS -eq 0 ]; then
              echo "Error: Could not make progress publishing remaining crates: $UNPUBLISHED"
              # Run one last time without catching to show the true error in CI logs plainly
              for crate in $UNPUBLISHED; do
                 cargo publish -p $crate
                 break
              done
              exit 1
            fi
            
            echo "Waiting before next retry loop..."
            sleep 10
          done
