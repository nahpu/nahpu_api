name: Release

on:
  push:
    branches: [ "release" ]

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: read

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Publish crates
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATE_IO_NAHPU_API }}
        run: |
          CRATES=$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[] | select(.publish != []) | .name')

          for crate in $CRATES; do
            echo "Publishing $crate..."
            EXIT_CODE=0
            OUTPUT=$(cargo publish -p "$crate" 2>&1) || EXIT_CODE=$?
            echo "$OUTPUT"

            if [ "$EXIT_CODE" -eq 0 ]; then
              echo "Successfully published $crate."
              sleep 5
            elif echo "$OUTPUT" | grep -q "already exists"; then
              echo "Crate $crate is already published. Skipping."
            else
              echo "Error: Failed to publish $crate."
              exit 1
            fi
          done
